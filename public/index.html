<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Presença Facial</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>

<body>
  <main class="capture-screen">
    <a class="camera-brand" href="/portal">Viu <span>Liberou</span></a>
    <video id="video" autoplay muted playsinline></video>

    <section id="status" class="status-panel waiting" aria-live="polite">
      <span id="statusLabel">Aproxime seu rosto</span>
      <strong id="statusDetail">Preparando reconhecimento facial...</strong>
    </section>
  </main>

  <script>
    const video = document.getElementById('video')
    const statusPainel = document.getElementById('status')
    const statusLabel = document.getElementById('statusLabel')
    const statusDetail = document.getElementById('statusDetail')

    let analisando = false
    let pausadoAte = 0

    function atualizarStatus(tipo, label, detail = '') {
      statusPainel.className = `status-panel ${tipo}`
      statusLabel.textContent = label
      statusDetail.textContent = detail
    }

    async function carregarModelos() {
      atualizarStatus('loading', 'Aproxime seu rosto', 'Carregando reconhecimento facial...')

      await faceapi.nets.tinyFaceDetector.loadFromUri('./models')
      await faceapi.nets.faceLandmark68Net.loadFromUri('./models')
      await faceapi.nets.faceRecognitionNet.loadFromUri('./models')
    }

    async function iniciarCamera() {
      atualizarStatus('loading', 'Aproxime seu rosto', 'Abrindo câmera...')

      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'user',
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      })

      video.srcObject = stream

      await new Promise((resolve) => {
        video.onloadedmetadata = () => resolve()
      })
    }

    async function detectarRosto() {
      return faceapi
        .detectSingleFace(
          video,
          new faceapi.TinyFaceDetectorOptions({
            inputSize: 224,
            scoreThreshold: 0.5
          })
        )
        .withFaceLandmarks()
        .withFaceDescriptor()
    }

    async function confirmarPresenca(descriptor) {
      const resposta = await fetch('/presenca', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          descriptor
        })
      })

      return resposta.json()
    }

    async function analisarFacial() {
      if (analisando || Date.now() < pausadoAte) return

      analisando = true

      try {
        const deteccao = await detectarRosto()

        if (!deteccao) {
          atualizarStatus('waiting', 'Aproxime seu rosto', 'Centralize o rosto na câmera')
          return
        }

        atualizarStatus('identifying', 'Identificando facial', 'Aguarde alguns instantes')

        const dados = await confirmarPresenca(Array.from(deteccao.descriptor))

        if (dados.success) {
          const aviso = dados.tipo === 'warning'

          atualizarStatus(
            aviso ? 'warning' : 'success',
            aviso ? 'Presença já registrada' : 'Presença confirmada',
            dados.aluno ? `${dados.aluno} | ${dados.mensagem}` : dados.mensagem
          )
          pausadoAte = Date.now() + 5000
          return
        }

        atualizarStatus('error', 'Erro na identificação', dados.mensagem || 'Rosto não reconhecido')
        pausadoAte = Date.now() + 3000
      } catch (erro) {
        console.log('ERRO AO RECONHECER:', erro)
        atualizarStatus('error', 'Erro na identificação', 'Não foi possível confirmar a presença')
        pausadoAte = Date.now() + 3000
      } finally {
        analisando = false
      }
    }

    async function iniciarSistema() {
      try {
        await carregarModelos()
        await iniciarCamera()
        atualizarStatus('waiting', 'Aproxime seu rosto', 'Centralize o rosto na câmera')

        setInterval(analisarFacial, 1200)
      } catch (erro) {
        console.log('ERRO AO INICIAR:', erro)
        atualizarStatus('error', 'Erro ao iniciar', 'Verifique a câmera e recarregue a página')
      }
    }

    iniciarSistema()
  </script>
</body>
</html>
